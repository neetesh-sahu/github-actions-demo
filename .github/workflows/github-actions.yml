name: first workflow
on:
  push:
    branchs:
      - main
env:
  MY_NAME: neetesh      
jobs:
  demo-jobs:
    runs-on: ubuntu-latest
    env:
      FROM: indore
    steps:
      
      - name: checkout
        uses: actions/checkout@v4
      - name: env
        env:
          MY_JOB: devops engineer
      - name: who are you?
        run: |
          echo "Im $MY_NAME and im from $FROM im a $MY_JOB"    
  demo-jobs2:
    needs: demo-jobs
    runs-on: self-hosted   
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: check os
        run: |
          uname -a
          whoami

      - name: create a file
        run: |
          echo "this file was created in action2 $my-name" > demo.txt
          ls -l
      - name: read the file
        run: |
          cat demo.txt        
