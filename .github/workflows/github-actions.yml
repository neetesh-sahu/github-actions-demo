name: first workflow
on:
  push:
    branchs:
      - main
env:
  my_name: neetesh      
jobs:
  demo-jobs:
    runs-on: ubuntu-latest
    env:
      from: indore
    steps:
      
      - name: checkout
        uses: actions/checkout@v4
      - name: env
        env:
          my_job: devops engineer
      - name: who are you?
        run: echo "Im $my_name and im from $from im a $my_job"    
  demo-jobs2:
    needs: demo-jobs
    runs-on: self-hosted   
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: check os
        run: |
          uname -a
          whoami

      - name: create a file
        run: |
          echo "this file was created in action2 $my-name" > demo.txt
          ls -l
      - name: read the file
        run: |
          cat demo.txt        
